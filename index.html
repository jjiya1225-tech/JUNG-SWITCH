<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>칸트라이팅 - 단가 산정툴 (내부용)</title>
<style>
 body{font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#f4f4f2;color:#1a1a1a;margin:0;padding:24px;line-height:1.5}
 .wrap{max-width:860px;margin:0 auto}
 h1{font-size:20px;margin:0 0 4px}.sub{color:#666;font-size:13px;margin:0 0 18px}
 .panel{background:#fff;border:1px solid #e4e4e0;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:18px}
 textarea{width:100%;height:90px;font-family:monospace;font-size:12px;border:1px solid #ddd;border-radius:8px;padding:10px;box-sizing:border-box;resize:vertical}
 .btn{border:none;border-radius:9px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
 .btn.primary{background:#111;color:#fff}.btn.ghost{background:#fff;border:1.5px solid #ddd;margin-left:8px}
 .err{color:#b5532b;font-size:13px;margin-top:8px}
 .pdoc h2{font-size:18px}
 .pdoc .meta{display:flex;justify-content:space-between;margin:12px 0;font-size:12.5px;color:#666}
 table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
 th,td{border:1px solid #ddd;padding:8px 10px;text-align:left;vertical-align:top}
 th{background:#f6f6f4}.num{text-align:right}.totrow td{font-weight:800;background:#fafaf8}
 .prev{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0 16px}
 .prev .cap{font-size:11px;color:#666;text-align:center;margin-top:4px}
 .note{font-size:11px;color:#888;margin-top:12px;line-height:1.6}
 .setblock{border:1px solid #e4e4e0;border-radius:10px;padding:14px;margin:14px 0}
 .sethdr{font-weight:700;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
 .sethdr span{font-size:12px;font-weight:600;color:#666;background:#f2f2ef;border-radius:6px;padding:2px 9px}
 .grp td{background:#faf8f4;font-size:11px;color:#888;font-weight:600}
 .setsub td{font-weight:700;background:#fafaf8}
 .grand{margin-top:6px}
 .printbar{margin-top:14px;text-align:right}
 @media print{
   body{padding:0;background:#fff}
   #inputPanel,h1,.sub,.err,.printbar{display:none!important}
   #out .panel{border:none;box-shadow:none;padding:0;margin:0}
 }
</style></head><body><div class="wrap">
<h1>JUNG 융스위치 단가 산정툴 <span style="font-size:12px;background:#fbece6;color:#b5532b;border-radius:6px;padding:2px 8px">내부용</span></h1>
<p class="sub">고객이 보낸 <b>구성 코드(JS1-...)</b>를 붙여넣고 산출하세요. 이 파일은 외부에 공개하지 마세요(단가 포함).</p>
<div class="panel" id="inputPanel">
 <textarea id="code" placeholder="여기에 구성 코드를 붙여넣으세요 (예: JS1-eyJ...)"></textarea>
 <div style="margin-top:10px"><button class="btn primary" onclick="run()">단가 산출</button></div>
 <div class="err" id="err"></div>
</div>
<div id="out"></div>
</div>

  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  const f=x=> amt>=0? x+(255-x)*amt : x*(1+amt);
  return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(f(x)))).toString(16).padStart(2,'0')).join('');
}

function socketSVG(recess,edge,dark2){
  return `<circle cx="50" cy="50" r="34" fill="${recess}" stroke="${edge}" stroke-width="1.6"/>`+
    `<circle cx="50" cy="50" r="34" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="3" opacity=".5"/>`+
    `<circle cx="36" cy="50" r="5.5" fill="${dark2}"/><circle cx="64" cy="50" r="5.5" fill="${dark2}"/>`+
    `<rect x="44" y="17" width="12" height="4.5" rx="2" fill="${edge}"/><rect x="44" y="78" width="12" height="4.5" rx="2" fill="${edge}"/>`;
}

function usbcPill(cx,cy,recess,edge){return `<rect x="${cx-14}" y="${cy-5.5}" width="28" height="11" rx="5.5" fill="${recess}" stroke="${edge}" stroke-width="1.2"/><rect x="${cx-9}" y="${cy-1.5}" width="18" height="3" rx="1.5" fill="${edge}"/>`;}
/* 기능 그래픽만(모듈 몸체 없이) - 100x100 기준 */
function faceGraphic(type,hex,dark){
  const edge=dark?'rgba(255,255,255,.30)':'rgba(0,0,0,.18)';
  const soft=dark?'rgba(0,0,0,.4)':'rgba(0,0,0,.13)';
  const paddle=shadeHex(hex,dark?0.08:0.045);
  const recess=shadeHex(hex,dark?-0.16:-0.11);
  const dark2=dark?'#0c0c0c':'#3a3a3a';
  switch(type){
    case 'rocker': return '';
    case 'rocker2': return `<line x1="50" y1="12" x2="50" y2="88" stroke="${soft}" stroke-width="2"/>`;
    case 'rocker3': return `<line x1="35" y1="12" x2="35" y2="88" stroke="${soft}" stroke-width="2"/><line x1="65" y1="12" x2="65" y2="88" stroke="${soft}" stroke-width="2"/>`;
    case 'rotary': return `<circle cx="50" cy="50" r="30" fill="${recess}" stroke="${edge}" stroke-width="1.4"/><circle cx="50" cy="50" r="22" fill="${paddle}" stroke="${edge}" stroke-width="1.2"/><circle cx="50" cy="50" r="2.5" fill="${edge}"/>`;
    case 'socket': return socketSVG(recess,edge,dark2);
    case 'socket_usb': return `<g transform="translate(50,56) scale(0.8) translate(-50,-50)">${socketSVG(recess,edge,dark2)}</g>`+usbcPill(50,18,recess,edge);
    case 'usb': return usbcPill(50,38,recess,edge)+usbcPill(50,66,recess,edge);
    case 'data': return `<rect x="32" y="32" width="36" height="27" rx="2" fill="${recess}" stroke="${edge}" stroke-width="1.4"/><rect x="42" y="59" width="16" height="10" rx="1.5" fill="${recess}" stroke="${edge}" stroke-width="1.2"/>`;
    case 'tv': return `<circle cx="50" cy="50" r="22" fill="${recess}" stroke="${edge}" stroke-width="1.5"/><circle cx="50" cy="50" r="4.5" fill="${dark2}"/>`;
    case 'speaker': return `<circle cx="36" cy="50" r="11" fill="${recess}" stroke="${edge}" stroke-width="1.3"/><circle cx="36" cy="50" r="4.5" fill="#c9a24a"/><circle cx="64" cy="50" r="11" fill="${recess}" stroke="${edge}" stroke-width="1.3"/><circle cx="64" cy="50" r="4.5" fill="#b5402f"/>`;
    case 'hdmi': return `<path d="M28 41 l8 -10 h28 l8 10 v16 h-52 z" fill="${recess}" stroke="${edge}" stroke-width="1.4"/>`;
    case 'blank': default: return '';
  }
}

function previewFrameSVG(hex,dark,types,interactive){
  const n=Math.max(1,types.length), m=120, fr=14;
  const W=fr*2+n*m, H=fr*2+m;
  const fLight=shadeHex(hex,dark?0.18:0.12), fEdge=shadeHex(hex,dark?-0.26:-0.16);
  const face=shadeHex(hex,dark?0.05:0.03);
  const gid='g'+Math.random().toString(36).slice(2,7);
  let inner='';
  /* 모듈 칸 영역(중간선까지). 모듈은 이 칸을 꽉 채움 */
  inner+=`<rect x="${fr}" y="${fr}" width="${n*m}" height="${m}" rx="3" fill="${face}" stroke="${fEdge}" stroke-width="1.2"/>`;
  types.forEach((t,i)=>{
    const x=fr+i*m, y=fr;
    if(i>0) inner+=`<line x1="${x}" y1="${fr}" x2="${x}" y2="${fr+m}" stroke="${fEdge}" stroke-width="1.4"/>`;
    if(t){ inner+=`<g transform="translate(${x},${y}) scale(${m/100})">${faceGraphic(t,hex,dark)}</g>`; }
    else { inner+=`<text x="${x+m/2}" y="${y+m/2+15}" text-anchor="middle" font-size="42" font-weight="300" fill="${dark?'rgba(255,255,255,.5)':'rgba(0,0,0,.3)'}">＋</text>`; }
    if(interactive) inner+=`<rect x="${x}" y="${y}" width="${m}" height="${m}" fill="transparent" style="cursor:pointer" onclick="openPicker(${i})"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:${W}px;max-width:100%;height:auto;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">`+
    `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${fLight}"/><stop offset="1" stop-color="${shadeHex(hex,dark?-0.08:-0.05)}"/></linearGradient></defs>`+
    `<rect x="0" y="0" width="${W}" height="${H}" rx="4" fill="url(#${gid})" stroke="${fEdge}" stroke-width="1.2"/>`+
    `${inner}</svg>`;
}

function colorMeta(key){for(const m of DATA.materials){const c=m.colors.find(c=>c.name===key);if(c)return{ko:c.ko,hex:c.hex,dark:c.dark,mat:m.name};}return{ko:key,hex:'#ccc',dark:false,mat:''};}
function decodeReq(code){code=code.trim().replace(/^JS1-/,'');return JSON.parse(decodeURIComponent(escape(atob(code))));}
function priceItem(it){
  const P=DATA.prices[it.c]; if(!P) throw new Error('알 수 없는 색상: '+it.c);
  const frame=(P.frame_ls990&&P.frame_ls990[it.g])||0;
  let func=0, types=[], lines=[];
  (it.m||[]).forEach(nm=>{const f=P.functions.find(x=>x.name===nm);
    if(f){func+=f.price;types.push(f.type);lines.push({name:nm,price:f.price});}
    else{types.push('blank');lines.push({name:nm+' (단가없음)',price:0});}});
  let wb=0, wlist=[];
  (it.w||[]).forEach(a=>{const w=DATA.wallbox.find(x=>x.id===a[0]);if(w){wb+=w.price*a[1];wlist.push({name:w.name,qty:a[1],price:w.price});}});
  return {frame,func,wb,types,lines,wlist,unit:frame+func+wb};
}
function run(){
  const err=document.getElementById('err');err.textContent='';
  let items;
  try{items=decodeReq(document.getElementById('code').value);}
  catch(e){err.textContent='코드를 해석할 수 없습니다. 올바른 구성 코드인지 확인하세요.';document.getElementById('out').innerHTML='';return;}
  try{render(items);}catch(e){err.textContent='오류: '+e.message;}
}
function render(items){
  const today=new Date().toLocaleDateString('ko-KR');
  const no='Q-'+Date.now().toString().slice(-6);
  let sub=0, blocks='';
  items.forEach((it,i)=>{
    const cm=colorMeta(it.c); const pr=priceItem(it); const line=pr.unit*it.q; sub+=line;
    let det=`<tr><td>프레임 (${it.g}구)</td><td class="num">1</td><td class="num">${won(pr.frame)}</td><td class="num">${won(pr.frame)}</td></tr>`;
    pr.lines.forEach(l=>{det+=`<tr><td>${l.name}</td><td class="num">1</td><td class="num">${won(l.price)}</td><td class="num">${won(l.price)}</td></tr>`;});
    pr.wlist.forEach(w=>{det+=`<tr><td>${w.name}</td><td class="num">${w.qty}</td><td class="num">${won(w.price)}</td><td class="num">${won(w.price*w.qty)}</td></tr>`;});
    blocks+=`<div class="setblock">
      <div class="sethdr"><span>${i+1}. JUNG LS990 · ${cm.ko} · ${cm.mat} · ${it.g}구</span><span>세트 ×${it.q}</span></div>
      <div class="prev"><div style="display:inline-block;max-width:280px">${previewFrameSVG(cm.hex,cm.dark,pr.types,false)}</div></div>
      <table><thead><tr><th>구성 항목</th><th class="num">수량</th><th class="num">단가</th><th class="num">금액</th></tr></thead><tbody>
      <tr class="grp"><td colspan="4">▸ 프레임 + 기능 모듈</td></tr>
      ${det}
      <tr class="setsub"><td colspan="3" class="num">세트 단가 (1세트당)</td><td class="num">${won(pr.unit)}</td></tr>
      <tr class="setsub"><td colspan="3" class="num">소계 (× ${it.q}세트)</td><td class="num">${won(line)}</td></tr>
      </tbody></table></div>`;
  });
  const vat=Math.round(sub*0.1), tot=sub+vat;
  document.getElementById('out').innerHTML=`<div class="panel pdoc"><h2>견 적 서</h2>
   <div class="meta"><div>문서번호: ${no}<br>수신: ____________________ 귀하</div>
   <div style="text-align:right">작성일: ${today}<br>공급자: 칸트라이팅</div></div>
   ${blocks}
   <table class="grand"><tbody>
   <tr><td class="num" style="width:78%">공급가액</td><td class="num">${won(sub)}</td></tr>
   <tr><td class="num">부가세 (10%)</td><td class="num">${won(vat)}</td></tr>
   <tr class="totrow"><td class="num">합계금액</td><td class="num">${won(tot)}</td></tr>
   </tbody></table>
   <div class="note">※ 단가는 JUNG 융스위치 단가표(KANT) 기준이며 VAT 별도입니다. 매립박스 구매 시 배선기구 설치용 피스가 포함됩니다.</div></div>
   <div class="printbar"><button class="btn primary" onclick="printDoc()">인쇄 / PDF 저장</button></div>`;
}
function printDoc(){window.print();}
