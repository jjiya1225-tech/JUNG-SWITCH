<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUNG 융스위치 실시간 견적 · 발주</title>
<style>
  :root{
    --bg:#f4f4f2;--panel:#fff;--ink:#1a1a1a;--sub:#6b6b6b;--line:#e4e4e0;
    --accent:#111;--accent2:#b08d4f;--ok:#1f7a4d;--radius:14px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  header.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  header.top .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:-.02em}
  .brand .logo{width:34px;height:34px;border-radius:8px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-size:13px;font-weight:800}
  .brand small{display:block;font-weight:500;color:var(--sub);font-size:11px;letter-spacing:0}
  .hint{font-size:12px;color:var(--sub)}
  .layout{display:grid;grid-template-columns:1fr 360px;gap:24px;padding:28px 0 80px}
  @media(max-width:920px){.layout{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .step{padding:22px 24px;margin-bottom:18px}
  .step h2{font-size:15px;display:flex;align-items:center;gap:10px;margin-bottom:16px;letter-spacing:-.01em}
  .step h2 .n{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;
    font-size:12px;display:grid;place-items:center;flex:none}
  .step h2 .sublab{font-weight:500;color:var(--sub);font-size:12px}
  .opt{border:1.5px solid var(--line);border-radius:10px;padding:13px 14px;cursor:pointer;
    transition:.15s;background:#fff;text-align:left}
  .opt:hover{border-color:#bdbdbd}
  .opt.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
  .opt.disabled{opacity:.4;pointer-events:none}
  .opt .t{font-weight:600;font-size:13.5px}
  .opt .d{font-size:11.5px;color:var(--sub);margin-top:3px}
  .opt .p{font-size:12px;color:var(--accent2);font-weight:700;margin-top:6px}
  /* series fixed */
  .seriescard{display:flex;align-items:center;gap:14px;border:1.5px solid var(--accent);border-radius:10px;padding:14px 16px;background:#fafafa}
  .seriescard .badge2{font-size:10px;background:var(--accent);color:#fff;border-radius:6px;padding:3px 8px;font-weight:700}
  /* material tabs */
  .mtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .mtab{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:8px 15px;font-size:13px;
    cursor:pointer;font-family:inherit;transition:.15s}
  .mtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .swatches{display:flex;flex-wrap:wrap;gap:10px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:74px}
  .sw .dot{width:50px;height:50px;border-radius:10px;border:1.5px solid #d0d0cc;transition:.15s}
  .sw.sel .dot{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,.08);transform:scale(1.04)}
  .sw span{font-size:10.5px;color:var(--sub);text-align:center;line-height:1.25}
  .formrow{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .formrow .opt{flex:1;min-width:150px}
  .gangbar{display:flex;gap:8px;flex-wrap:wrap}
  .gangbar .opt{min-width:62px;text-align:center}
  .gangbar .opt .t{font-size:18px}
  /* builder preview */
  .builder{margin-top:18px}
  .stage{display:flex;justify-content:center;padding:20px 8px 8px;overflow-x:auto}
  .wall{background:#edece8;border-radius:14px;padding:26px;box-shadow:inset 0 2px 10px rgba(0,0,0,.06)}
  .frame{display:flex;gap:8px;border-radius:8px;padding:0;position:relative}
  .module{width:100px;height:100px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    position:relative;flex:none;cursor:pointer;transition:.15s;background:#fff;
    border:1px solid rgba(0,0,0,.07);box-shadow:0 2px 7px rgba(0,0,0,.12);overflow:hidden}
  .module:hover{box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .module .modimg{width:100%;height:100%;object-fit:contain}
  .module svg{width:78px;height:90px}
  .module.empty-mod{background:#f7f7f4;border:1.5px dashed var(--accent2)}
  .module .empty-ic{font-size:30px;font-weight:300;color:var(--accent2)}
  /* 매립박스 수량 */
  .wbopt{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1.5px solid var(--line);
    border-radius:10px;padding:11px 13px;background:#fff;transition:.15s}
  .wbopt.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,.05)}
  .wbopt .wbinfo .t{font-weight:600;font-size:13px;word-break:keep-all}
  .wbopt .wbinfo .d{font-size:11.5px;color:var(--sub);margin-top:2px}
  .stepper.sm{flex:none}
  .stepper.sm button{width:30px;height:30px;font-size:16px}
  .stepper.sm .wbq{display:inline-grid;place-items:center;width:38px;height:30px;border-left:1px solid var(--line);border-right:1px solid var(--line);font-size:14px;font-weight:600}
  .posbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .posbtn{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:8px;cursor:pointer;
    width:120px;text-align:center;font-family:inherit;transition:.15s}
  .posbtn:hover{border-color:#bbb}
  .posbtn.empty{border-style:dashed;border-color:var(--accent2);color:var(--accent2)}
  .posbtn .pi{font-size:11px;color:var(--sub)}
  .posbtn .pn{font-size:12px;font-weight:600;margin-top:3px;line-height:1.25}
  .posbtn .pp{font-size:11px;color:var(--accent2);font-weight:700;margin-top:3px}
  /* aside */
  aside{position:sticky;top:88px;align-self:start}
  .quote{padding:20px 22px}
  .quote h3{font-size:14px;margin-bottom:4px}
  .quote .summ{font-size:12.5px;color:var(--sub);margin-bottom:14px;line-height:1.7}
  .priceline{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-top:1px dashed var(--line);gap:8px}
  .priceline span:last-child{font-weight:600;white-space:nowrap}
  .priceline.tot{border-top:2px solid var(--ink);margin-top:6px;padding-top:12px;font-size:17px;font-weight:800}
  .qtyrow{display:flex;align-items:center;gap:10px;margin:14px 0}
  .qtyrow label{font-size:13px;color:var(--sub)}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .stepper button{width:34px;height:34px;border:none;background:#fff;font-size:17px;cursor:pointer}
  .stepper button:hover{background:#f2f2ef}
  .stepper input{width:46px;text-align:center;border:none;border-left:1px solid var(--line);
    border-right:1px solid var(--line);font-size:14px;height:34px}
  .btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;
    font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.primary:hover{background:#000}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink);margin-top:8px}
  .btn.ghost:hover{border-color:#bbb}
  .warn{font-size:12px;color:#b5532b;background:#fbf0ea;border:1px solid #f0d8cc;border-radius:8px;
    padding:9px 11px;margin-top:10px;display:none}
  .warn.show{display:block}
  .cart{padding:18px 22px;margin-top:18px}
  .cart h3{font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .cart h3 .cnt{font-size:11px;background:#eee;border-radius:20px;padding:2px 9px;color:var(--sub)}
  .citem{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px;font-size:12.5px}
  .citem .ct{font-weight:600;display:flex;justify-content:space-between;gap:8px}
  .citem .cd{color:var(--sub);font-size:11.5px;margin-top:3px}
  .citem .cb{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
  .citem .cb .pr{font-weight:700}
  .citem .del{background:none;border:none;color:#c0392b;font-size:11.5px;cursor:pointer}
  .empty{color:var(--sub);font-size:12.5px;text-align:center;padding:14px 0}
  .acts{margin-top:14px}
  /* mobile bar */
  .mbar{display:none}
  @media(max-width:920px){
    .mbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:60;background:#fff;
      border-top:1px solid var(--line);padding:10px 16px;gap:12px;align-items:center;
      justify-content:space-between;box-shadow:0 -4px 18px rgba(0,0,0,.10)}
    .mbar .mp{line-height:1.25}.mbar .mp small{font-size:11px;color:var(--sub);display:block}
    .mbar .mp b{font-size:18px}.mbar .mbtns{display:flex;gap:8px}
    .mbar .btn{width:auto;padding:12px 16px;margin:0}
    body{padding-bottom:78px}aside{position:static}
    header.top .hint{display:none}.step{padding:18px 16px}
    #docBody{padding:18px 14px}.docfoot{flex-wrap:wrap}.docfoot .btn{flex:1;min-width:130px}
  }
  /* === 모바일: 가로 스크롤 금지 · 동일 위계는 한 줄 === */
  @media(max-width:920px){
    .wrap{padding:0 12px}
    /* 재질 탭 한 줄 */
    .mtabs{flex-wrap:nowrap;gap:5px}
    .mtab{flex:1 1 0;min-width:0;padding:8px 4px;font-size:12px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    /* 색상 스와치 한 줄 */
    .swatches{flex-wrap:nowrap;gap:6px}
    .sw{width:auto;flex:1 1 0;min-width:0}
    .sw .dot{width:100%;max-width:54px;height:auto;aspect-ratio:1/1}
    .sw span{font-size:9.5px;word-break:keep-all}
    /* 프레임 형태 한 줄 */
    .formrow{gap:7px}
    .formrow .opt{min-width:0;flex:1 1 0}
    /* 구 수 한 줄 */
    .gangbar{flex-wrap:nowrap;gap:6px}
    .gangbar .opt{flex:1 1 0;min-width:0;padding:9px 2px}
    .gangbar .opt .t{font-size:16px}
    /* 미리보기: 폭에 맞춰 모듈 축소, 가로 스크롤 제거 */
    .stage{padding:14px 0 6px;overflow:visible}
    .wall{padding:14px;width:100%}
    .frame{width:100%;gap:6px;justify-content:center}
    .module{width:auto;flex:1 1 0;min-width:0;height:auto;aspect-ratio:1/1;max-width:100px}
    .module svg{width:82%;height:82%}
    .module .empty-ic{font-size:22px}
    /* 위치별 기능 버튼: 미리보기와 동일하게 한 줄 */
    .posbtns{flex-wrap:nowrap;gap:5px;align-items:stretch}
    .posbtn{width:auto;flex:1 1 0;min-width:0;padding:7px 3px;display:flex;flex-direction:column;justify-content:center}
    .posbtn .pi{font-size:9px}
    .posbtn .pn{font-size:10px;word-break:keep-all}
    .posbtn .pp{font-size:9.5px}
    /* 매립박스 한 줄에 2개 */
    #wallboxOpts{grid-template-columns:1fr !important}
    #wallboxOpts .opt{padding:11px 10px}
    #wallboxOpts .opt .t{font-size:12.5px;word-break:keep-all}
  }
  @media(max-width:380px){
    .mtab{font-size:11px;padding:7px 2px}
    .sw span{font-size:9px}
    .posbtn .pn{font-size:9px}
  }
  /* overlay/modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:100;
    align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto}
  .overlay.on{display:flex}
  .sheet{background:#fff;border-radius:12px;max-width:720px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .sheet .sh{padding:15px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .sheet .sh h3{font-size:15px}.sheet .sh .x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub)}
  .ptabs{display:flex;flex-wrap:wrap;gap:7px;padding:14px 20px 0}
  .ptab{border:1.5px solid var(--line);background:#fff;border-radius:18px;padding:6px 13px;font-size:12.5px;
    cursor:pointer;font-family:inherit;transition:.15s;color:var(--ink);white-space:nowrap}
  .ptab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ptab b{font-weight:600;opacity:.55;margin-left:4px;font-size:11px}
  .ptab.on b{opacity:.85}
  .thumbs{padding:14px 20px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;max-height:56vh;overflow:auto}
  .thumb{border:1.5px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;text-align:center;transition:.15s;background:#fff}
  .thumb:hover{border-color:#999}
  .thumb.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
  .thumb .tc{height:84px;display:flex;align-items:center;justify-content:center;border-radius:7px;margin-bottom:7px;background:#f4f4f2;overflow:hidden}
  .thumb .tc svg{width:54px;height:70px}
  .thumb .tc .thumbimg{width:100%;height:100%;object-fit:contain}
  .thumb .tn{font-size:11.5px;font-weight:600;line-height:1.25}
  .thumb .tp{font-size:11px;color:var(--accent2);font-weight:700;margin-top:3px}
  /* document */
  .doc{background:#fff;border-radius:12px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .doc .dochead{padding:16px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .doc .dochead .x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub)}
  .tabs{display:flex;gap:6px}
  .tabs button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  #docBody{padding:26px 30px}
  .docfoot{padding:14px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .docfoot .btn{width:auto;padding:11px 20px}
  .pdoc h1{font-size:22px;letter-spacing:-.02em}
  .pdoc .meta{display:flex;justify-content:space-between;margin:14px 0 18px;font-size:12.5px;color:var(--sub)}
  .pdoc table{width:100%;border-collapse:collapse;font-size:12px}
  .pdoc th,.pdoc td{border:1px solid #ddd;padding:7px 9px;text-align:left;vertical-align:top}
  .pdoc th{background:#f6f6f4;font-weight:700}
  .pdoc td.num,.pdoc th.num{text-align:right}
  .pdoc .totrow td{font-weight:800;font-size:13px;background:#fafaf8}
  .pdoc .note{font-size:11px;color:var(--sub);margin-top:14px;line-height:1.6}
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="brand"><div class="logo">JU</div>
      <div>JUNG 융스위치 실시간 견적<small>칸트라이팅 · 실단가 기준 (VAT 별도)</small></div></div>
    <div class="hint">색상 → 구성 → 매립박스 → 발주</div>
  </div>
</header>

<div class="wrap">
  <div class="layout">
    <main>
      <section class="card step">
        <h2><span class="n">1</span> 시리즈</h2>
        <div class="seriescard"><span class="badge2">LS990</span>
          <div><div style="font-weight:700;font-size:14px">JUNG LS990</div>
          <div style="font-size:12px;color:var(--sub)">취급 시리즈 · 플랫 디자인. 색상과 구성을 아래에서 선택하세요.</div></div></div>
      </section>

      <section class="card step">
        <h2><span class="n">2</span> 프레임 색상 · 마감 <span class="sublab" id="colorPick"></span></h2>
        <div class="mtabs" id="mtabs"></div>
        <div class="swatches" id="swatches"></div>
      </section>

      <section class="card step">
        <h2><span class="n">3</span> 프레임 구 수 · 위치별 기능</h2>
        <div class="gangbar" id="gangbar"></div>
        <div class="builder">
          <div class="stage"><div class="wall"><div class="frame" id="frame"></div></div></div>
          <div class="posbtns" id="posbtns"></div>
        </div>
      </section>

      <section class="card step">
        <h2><span class="n">4</span> 매립박스 <span class="sublab">· 필수 (구 수 = 커버 수)</span></h2>
        <div class="opts" id="wallboxOpts" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px"></div>
      </section>
    </main>

    <aside>
      <section class="card quote">
        <h3>실시간 견적 <span style="font-size:10px;background:#eef4ef;color:var(--ok);border-radius:6px;padding:2px 7px;font-weight:700">LIVE</span></h3>
        <div class="summ" id="summ"></div>
        <div id="breakdown"></div>
        <div class="priceline"><span>세트 단가 (VAT 별도)</span><span id="setPrice">₩0</span></div>
        <div class="qtyrow"><label>세트 수량</label>
          <div class="stepper"><button onclick="bumpQty(-1)">−</button>
          <input id="qty" value="1" inputmode="numeric" onchange="syncQty()">
          <button onclick="bumpQty(1)">+</button></div></div>
        <div class="priceline tot"><span>소계</span><span id="lineTotal">₩0</span></div>
        <div class="warn" id="warn"></div>
        <button class="btn primary acts" id="addBtn" onclick="addToCart()">＋ 견적에 담기</button>
        <button class="btn ghost" onclick="resetConfig()">선택 초기화</button>
      </section>

      <section class="card cart">
        <h3>견적 목록 <span class="cnt" id="cartCnt">0건</span></h3>
        <div id="cartList"><div class="empty">담은 항목이 없습니다.</div></div>
        <div class="priceline tot"><span>총 합계 (VAT 별도)</span><span id="grandTotal">₩0</span></div>
        <button class="btn primary acts" onclick="openDoc('quote')">📄 견적서 만들기</button>
      </section>
    </aside>
  </div>
</div>

<!-- mobile bar -->
<div class="mbar" id="mbar">
  <div class="mp"><small id="mbLabel">세트 단가 · <span id="mbCart">0건 담음</span></small><b id="mbPrice">₩0</b></div>
  <div class="mbtns"><button class="btn primary" onclick="addToCart()">＋ 담기</button>
  <button class="btn ghost" onclick="openDoc('quote')" style="margin-top:0">견적서</button></div>
</div>

<!-- function picker -->
<div class="overlay" id="pickOverlay">
  <div class="sheet">
    <div class="sh"><h3 id="pickTitle">기능 선택</h3><button class="x" onclick="closePicker()">×</button></div>
    <div class="ptabs" id="ptabs"></div>
    <div class="thumbs" id="thumbs"></div>
  </div>
</div>

<!-- document -->
<div class="overlay" id="overlay">
  <div class="doc">
    <div class="dochead">
      <div class="tabs"><span style="font-weight:700;font-size:15px">📄 견적서</span></div>
      <button class="x" onclick="closeDoc()">×</button></div>
    <div id="docBody"></div>
    <div class="docfoot"><button class="btn ghost" onclick="downloadDoc()" style="margin-top:0">HTML 다운로드</button>
    <button class="btn primary" onclick="printDoc()">인쇄 / PDF 저장</button></div>
  </div>

/* ---------- 벡터 렌더 (완전 선명, 연속 프레임) ---------- */
function shadeHex(hex,amt){
  let c=(hex||'#cccccc').replace('#','');
  if(c.length===3)c=c.split('').map(x=>x+x).join('');
  let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  const f=x=> amt>=0? x+(255-x)*amt : x*(1+amt);
  return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(f(x)))).toString(16).padStart(2,'0')).join('');
}
function socketSVG(recess,edge,dark2,sc){sc=sc||1;
  return `<g transform="translate(50,60) scale(${sc}) translate(-50,-60)"><circle cx="50" cy="60" r="34" fill="${recess}" stroke="${edge}" stroke-width="1.6"/>`+
    `<circle cx="50" cy="60" r="34" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="3" opacity=".5"/>`+
    `<circle cx="36" cy="60" r="5.5" fill="${dark2}"/><circle cx="64" cy="60" r="5.5" fill="${dark2}"/>`+
    `<rect x="44" y="27" width="12" height="4.5" rx="2" fill="${edge}"/><rect x="44" y="88" width="12" height="4.5" rx="2" fill="${edge}"/></g>`;
}
function usbcPill(cx,cy,recess,edge){return `<rect x="${cx-14}" y="${cy-5.5}" width="28" height="11" rx="5.5" fill="${recess}" stroke="${edge}" stroke-width="1.2"/><rect x="${cx-9}" y="${cy-1.5}" width="18" height="3" rx="1.5" fill="${edge}"/>`;}

    case 'tv': return `<circle cx="50" cy="60" r="24" fill="${recess}" stroke="${edge}" stroke-width="1.6"/><circle cx="50" cy="60" r="4.5" fill="${dark2}"/>`;
    case 'speaker': return `<circle cx="35" cy="60" r="12" fill="${recess}" stroke="${edge}" stroke-width="1.4"/><circle cx="35" cy="60" r="5" fill="#c9a24a"/><circle cx="65" cy="60" r="12" fill="${recess}" stroke="${edge}" stroke-width="1.4"/><circle cx="65" cy="60" r="5" fill="#b5402f"/>`;
    case 'hdmi': return `<path d="M27 50 l8 -11 h30 l8 11 v18 h-54 z" fill="${recess}" stroke="${edge}" stroke-width="1.5"/>`;
    case 'blank': default: return `<rect x="8" y="6" width="84" height="108" rx="9" fill="${shadeHex(hex,dark?0.03:0.015)}" stroke="${edge}" stroke-width="1.2"/>`;
  }
}
/* 하나의 연속 프레임 안에 모듈을 배치 */
function previewFrameSVG(hex,dark,types,interactive){
  const n=Math.max(1,types.length), mw=116, mh=150, pad=24, sep=12;
  const W=pad*2+n*mw+(n-1)*sep, H=pad*2+mh;
  const fLight=shadeHex(hex,dark?0.16:0.11), fEdge=shadeHex(hex,dark?-0.24:-0.15);
  const recess=shadeHex(hex,dark?-0.05:-0.03);
  const gid='g'+Math.random().toString(36).slice(2,7);
  let inner='';
  types.forEach((t,i)=>{
    const x=pad+i*(mw+sep), y=pad;
    inner+=`<rect x="${x}" y="${y}" width="${mw}" height="${mh}" rx="11" fill="${recess}" stroke="${fEdge}" stroke-width="1"/>`;
    inner+=`<rect x="${x+1.5}" y="${y+1.5}" width="${mw-3}" height="${mh-3}" rx="9.5" fill="none" stroke="${fLight}" stroke-width="1" opacity=".5"/>`;
    if(t){const fp=16,fw=mw-fp*2,fh=mh-fp*2;
      inner+=`<g transform="translate(${x+fp},${y+fp}) scale(${fw/100},${fh/120})">${faceSVG(t,hex,dark)}</g>`;
    } else {
      inner+=`<text x="${x+mw/2}" y="${y+mh/2+15}" text-anchor="middle" font-size="44" font-weight="300" fill="${dark?'rgba(255,255,255,.55)':'rgba(0,0,0,.3)'}">＋</text>`;
    }
    if(interactive)inner+=`<rect x="${x}" y="${y}" width="${mw}" height="${mh}" rx="11" fill="transparent" style="cursor:pointer" onclick="openPicker(${i})"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">`+
    `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${fLight}"/><stop offset=".5" stop-color="${hex}"/><stop offset="1" stop-color="${shadeHex(hex,dark?-0.1:-0.06)}"/></linearGradient></defs>`+
    `<rect x="0" y="0" width="${W}" height="${H}" rx="22" fill="url(#${gid})" stroke="${fEdge}" stroke-width="1.5"/>`+
    `<rect x="5" y="5" width="${W-10}" height="${H-10}" rx="17" fill="none" stroke="${fLight}" stroke-width="1" opacity=".55"/>`+
    `${inner}</svg>`;
}

/* ---------- 렌더링 ---------- */
function renderMaterials(){
  document.getElementById('mtabs').innerHTML=DATA.materials.map(m=>
    `<button class="mtab ${state.material===m.id?'on':''}" onclick="pickMaterial('${m.id}')">${m.name}</button>`).join('');
}
function renderColors(){
  const m=matObj();
  document.getElementById('swatches').innerHTML=m.colors.map(c=>
    `<div class="sw ${state.color===c.name?'sel':''}" onclick="pickColor('${c.name}')">
      <div class="dot" style="background:${c.hex}"></div><span>${c.ko}</span></div>`).join('');
  document.getElementById('colorPick').textContent='· '+(colorObj()?colorObj().ko:'');
}
function renderGang(){
  const mx=maxGang();
  document.getElementById('gangbar').innerHTML=[1,2,3,4,5].map(g=>
    `<button class="opt ${state.gang===g?'sel':''} ${g>mx?'disabled':''}" onclick="pickGang(${g})">
      <div class="t">${g}</div><div class="d">${g}구</div></button>`).join('');
}
function renderBuilder(){
  const c=colorObj();
  const frameEl=document.getElementById('frame');
  frameEl.style.background='transparent';frameEl.style.border='none';frameEl.style.boxShadow='none';
  const types=state.mods.map(mid=>mid?funcByName(mid).type:null);

  document.getElementById('posbtns').innerHTML=state.mods.map((mid,i)=>{
    if(!mid) return `<button class="posbtn empty" onclick="openPicker(${i})"><div class="pi">${i+1}번 위치</div><div class="pn">＋ 기능 선택</div></button>`;
    const f=funcByName(mid);
    return `<button class="posbtn" onclick="openPicker(${i})"><div class="pi">${i+1}번 위치</div><div class="pn">${f.name}</div><div class="pp">${won(f.price)}</div></button>`;
  }).join('');
}
function renderWallbox(){
  document.getElementById('wallboxOpts').innerHTML=DATA.wallbox.map(w=>{
    const q=state.wallboxQty[w.id]||0;
    return `<div class="wbopt ${q>0?'sel':''}">
      <div class="wbinfo"><div class="t">${w.name}</div><div class="d">${w.code||''} · ${won(w.price)}</div></div>
      <div class="stepper sm"><button onclick="setWb('${w.id}',-1)">−</button><span class="wbq">${q}</span><button onclick="setWb('${w.id}',1)">+</button></div>
    </div>`;
  }).join('');
}

/* ---------- 가격 ---------- */
function framePrice(){return priceObj().frame_ls990[state.gang]||0;}
function funcsPrice(){return state.mods.reduce((a,mid)=>a+(mid?funcByName(mid).price:0),0);}
function wallboxPrice(){return DATA.wallbox.reduce((a,w)=>a+(state.wallboxQty[w.id]||0)*w.price,0);}
function wallboxCount(){return DATA.wallbox.reduce((a,w)=>a+(state.wallboxQty[w.id]||0),0);}
function wallboxList(){return DATA.wallbox.filter(w=>(state.wallboxQty[w.id]||0)>0).map(w=>({name:w.name,qty:state.wallboxQty[w.id],price:w.price}));}
function setPrice(){return framePrice()+funcsPrice()+wallboxPrice();}

function validity(){
  const missing=state.mods.some(m=>!m);
  const noWall=wallboxCount()<1;
  let msg='';
  if(missing) msg='모든 위치의 기능을 선택해 주세요.';
  else if(noWall) msg='매립박스를 1개 이상 선택해 주세요.';
  return {ok:!missing&&!noWall,msg};
}

function renderQuote(){
  const c=colorObj(),m=matObj();
  document.getElementById('summ').innerHTML=
    `<b>LS990</b> · ${c.ko} (${m.name})<br>프레임 ${state.gang}구`;
  const wbp=wallboxPrice();
  document.getElementById('breakdown').innerHTML=
    `<div class="priceline"><span>프레임 (${state.gang}구)</span><span>${won(framePrice())}</span></div>`+
    `<div class="priceline"><span>기능 ${state.mods.filter(x=>x).length}개</span><span>${won(funcsPrice())}</span></div>`+
    (wbp?`<div class="priceline"><span>매립박스 ${wallboxCount()}개</span><span>${won(wbp)}</span></div>`:'');
  const sp=setPrice();
  document.getElementById('setPrice').textContent=won(sp);
  const q=Math.max(1,parseInt(document.getElementById('qty').value)||1);
  document.getElementById('lineTotal').textContent=won(sp*q);
  document.getElementById('mbPrice').textContent=won(sp*q);
  const v=validity();
  document.getElementById('warn').className='warn'+(v.ok?'':' show');
  document.getElementById('warn').textContent=v.msg;
  document.getElementById('addBtn').disabled=!v.ok;
}

/* ---------- 이벤트 ---------- */
function pickMaterial(id){state.material=id;state.color=matObj().colors[0].name;afterColorChange();}
function pickColor(nm){state.color=nm;afterColorChange();}
function afterColorChange(){renderAll();}
function pickGang(g){
  if(g>maxGang())return;
  state.gang=g;
  while(state.mods.length<g)state.mods.push(null);
  state.mods.length=g;
  renderAll();
}
/* 기능 카테고리 분류 */
const FCATS=[
  {id:'switch',name:'스위치',types:['rocker','rocker2','rocker3']},
  {id:'dimmer',name:'디머',types:['rotary']},
  {id:'socket',name:'콘센트',types:['socket','socket_usb']},
  {id:'usb',name:'USB충전',types:['usb']},
  {id:'av',name:'통신·AV',types:['data','tv','speaker','hdmi']},
  {id:'etc',name:'기타',types:['blank']},
];
const catOfType=t=>(FCATS.find(c=>c.types.includes(t))||FCATS[0]).id;
let pickCat=null;
function availCats(){const fns=priceObj().functions;return FCATS.filter(c=>fns.some(f=>c.types.includes(f.type)));}
function openPicker(pos){
  pickPos=pos;
  document.getElementById('pickTitle').textContent=(pos+1)+'번 위치 기능 선택';
  const avail=availCats();
  const cur=state.mods[pos];
  if(cur) pickCat=catOfType(funcByName(cur).type);
  if(!pickCat||!avail.find(c=>c.id===pickCat)) pickCat=avail[0].id;
  renderPickTabs();renderThumbs();
  document.getElementById('pickOverlay').classList.add('on');
}
function renderPickTabs(){
  const fns=priceObj().functions;
  document.getElementById('ptabs').innerHTML=availCats().map(c=>{
    const n=fns.filter(f=>c.types.includes(f.type)).length;
    return `<button class="ptab ${pickCat===c.id?'on':''}" onclick="setPickCat('${c.id}')">${c.name}<b>${n}</b></button>`;
  }).join('');
}
function setPickCat(id){pickCat=id;renderPickTabs();renderThumbs();}
function renderThumbs(){
  const c=colorObj();
  const cat=FCATS.find(x=>x.id===pickCat);
  const fns=priceObj().functions.filter(f=>cat.types.includes(f.type));
  document.getElementById('thumbs').innerHTML=fns.map(f=>{
    const vis=`<svg viewBox="0 0 100 120">${faceSVG(f.type,c.hex,c.dark)}</svg>`;
    return `<div class="thumb ${state.mods[pickPos]===f.name?'sel':''}" onclick="selectFunc(${pickPos},'${f.name.replace(/'/g,"\\'")}')">
      <div class="tc" style="background:${c.hex}">${vis}</div>
      <div class="tn">${f.name}</div><div class="tp">${won(f.price)}</div></div>`;}).join('');
}
function selectFunc(pos,nm){state.mods[pos]=nm;closePicker();renderBuilder();renderQuote();}
function closePicker(){document.getElementById('pickOverlay').classList.remove('on');}
function setWb(id,d){state.wallboxQty[id]=Math.max(0,(state.wallboxQty[id]||0)+d);renderWallbox();renderQuote();}
function bumpQty(d){const e=document.getElementById('qty');e.value=Math.max(1,(parseInt(e.value)||1)+d);renderQuote();}
function syncQty(){const e=document.getElementById('qty');e.value=Math.max(1,parseInt(e.value)||1);renderQuote();}

function renderAll(){renderMaterials();renderColors();renderGang();renderBuilder();renderWallbox();renderQuote();}

/* ---------- 장바구니 ---------- */
function addToCart(){
  if(!validity().ok)return;
  const c=colorObj(),m=matObj();
  const q=Math.max(1,parseInt(document.getElementById('qty').value)||1);
  cart.push({color:c.ko,material:m.name,colorHex:c.hex,colorDark:c.dark,
    gang:state.gang,mods:state.mods.map(mid=>funcByName(mid).name),
    modTypes:state.mods.map(mid=>funcByName(mid).type),
    modImgs:state.mods.map(mid=>funcByName(mid).img),
    framePrice:framePrice(),funcsPrice:funcsPrice(),
    wallbox:wallboxList(),wallboxPrice:wallboxPrice(),
    unit:setPrice(),qty:q});
  renderCart();
}
function delItem(i){cart.splice(i,1);renderCart();}
function renderCart(){
  document.getElementById('cartCnt').textContent=cart.length+'건';
  const list=document.getElementById('cartList');
  if(!cart.length)list.innerHTML='<div class="empty">담은 항목이 없습니다.</div>';
  else list.innerHTML=cart.map((it,i)=>`
    <div class="citem"><div class="ct"><span>LS990 ${it.color} · ${it.gang}구</span><button class="del" onclick="delItem(${i})">삭제</button></div>
    <div class="cd">${it.material}<br>${it.mods.join(' · ')}${it.wallbox&&it.wallbox.length?'<br>매립박스: '+it.wallbox.map(w=>w.name.replace('매립박스 ','')+'×'+w.qty).join(', '):''}</div>
    <div class="cb"><span>${won(it.unit)} × ${it.qty}</span><span class="pr">${won(it.unit*it.qty)}</span></div></div>`).join('');
  document.getElementById('grandTotal').textContent=won(cart.reduce((a,it)=>a+it.unit*it.qty,0));
  document.getElementById('mbCart').textContent=cart.length+'건 담음';
}

/* ---------- 문서 ---------- */
function buildDocItems(){
  if(cart.length)return cart;
  if(!validity().ok)return [];
  const c=colorObj(),m=matObj();
  return [{color:c.ko,material:m.name,colorHex:c.hex,colorDark:c.dark,
    gang:state.gang,mods:state.mods.map(mid=>funcByName(mid).name),
    modTypes:state.mods.map(mid=>funcByName(mid).type),
    modImgs:state.mods.map(mid=>funcByName(mid).img),wallbox:wallboxList(),
    unit:setPrice(),qty:Math.max(1,parseInt(document.getElementById('qty').value)||1)}];
}
function framePreviewHTML(it){
  return `<div style="display:inline-block;max-width:300px">${previewFrameSVG(it.colorHex,it.colorDark,it.modTypes||[],false)}</div>`;
}
function docHTML(){
  const items=buildDocItems();
  if(!items.length)return '<div class="pdoc"><p style="color:#b5532b">구성을 완료(모든 위치 기능 + 매립박스)하거나 견적 목록에 담은 뒤 출력하세요.</p></div>';
  const sub=items.reduce((a,it)=>a+it.unit*it.qty,0);
  const vat=Math.round(sub*0.1),tot=sub+vat;
  const today=new Date().toLocaleDateString('ko-KR');
  const no='Q-'+Date.now().toString().slice(-6);
  const previews=items.map((it,i)=>
    `<div style="text-align:center;flex:none">${framePreviewHTML(it)}
     <div style="font-size:11px;color:#666;margin-top:5px">${i+1}. LS990 ${it.color} · ${it.gang}구</div></div>`).join('');
  const wbtxt=it=>(it.wallbox&&it.wallbox.length)?' / 매립박스: '+it.wallbox.map(w=>w.name.replace('매립박스 ','')+'×'+w.qty).join(', '):'';
  const rows=items.map((it,i)=>`<tr><td class="num">${i+1}</td>
    <td>JUNG LS990 · ${it.color}<br><span style="color:#888;font-size:11px">${it.material} · ${it.gang}구</span><br>
    <span style="color:#888;font-size:11px">${it.mods.join(' / ')}${wbtxt(it)}</span></td>
    <td class="num">${it.qty}</td><td class="num">${won(it.unit)}</td><td class="num">${won(it.unit*it.qty)}</td></tr>`).join('');
  return `<div class="pdoc"><h1>견 적 서</h1>
    <div class="meta"><div>문서번호: ${no}<br>수신: ____________________ 귀하<br>현장/프로젝트: ____________________</div>
    <div style="text-align:right">작성일: ${today}<br>공급자: 칸트라이팅<br>담당: ____________ / TEL ____________</div></div>
    <div style="margin:4px 0 18px"><div style="font-size:12px;font-weight:700;color:#444;margin-bottom:8px">구성 미리보기</div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start">${previews}</div></div>
    <table><thead><tr><th class="num">No</th><th>품목</th><th class="num">수량(세트)</th><th class="num">단가</th><th class="num">금액</th></tr></thead>
    <tbody>${rows}
    <tr><td colspan="4" class="num">공급가액</td><td class="num">${won(sub)}</td></tr>
    <tr><td colspan="4" class="num">부가세 (10%)</td><td class="num">${won(vat)}</td></tr>
    <tr class="totrow"><td colspan="4" class="num">합계금액</td><td class="num">${won(tot)}</td></tr></tbody></table>
    <div class="note">※ 단가는 JUNG 융스위치 단가표(KANT) 기준이며 VAT 별도입니다.<br>
    ※ 매립박스 구매 시 배선기구 설치용 피스 포함. 프레임 구 수 = 커버 수로 발주해 주세요.<br>
    ※ 견적 유효기간: 작성일로부터 30일.</div></div>`;
}
function openDoc(type){docType='quote';switchDoc();document.getElementById('overlay').classList.add('on');}
function switchDoc(){document.getElementById('docBody').innerHTML=docHTML();}
function closeDoc(){document.getElementById('overlay').classList.remove('on');}
function printDoc(){const w=window.open('','_blank');
  w.document.write(`<html><head><meta charset="utf-8"><title>견적서</title>
  <style>body{font-family:-apple-system,"Noto Sans KR",sans-serif;padding:40px;color:#1a1a1a}h1{font-size:24px}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}th,td{border:1px solid #ccc;padding:8px 10px;vertical-align:top}
  .num{text-align:right}th{background:#f4f4f2}.totrow td{font-weight:800;background:#fafaf8}
  .meta{display:flex;justify-content:space-between;margin:16px 0;font-size:13px;color:#555}.note{font-size:11px;color:#888;margin-top:16px;line-height:1.6}</style></head>
  <body>${docHTML(docType)}</body></html>`);
  w.document.close();w.focus();setTimeout(()=>w.print(),300);}
function downloadDoc(){const html=`<html><head><meta charset="utf-8"><title>견적서</title>
  <style>body{font-family:"Noto Sans KR",sans-serif;padding:40px;color:#1a1a1a}h1{font-size:24px}table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{border:1px solid #ccc;padding:8px 10px;vertical-align:top}.num{text-align:right}th{background:#f4f4f2}.totrow td{font-weight:800}
  .meta{display:flex;justify-content:space-between;margin:16px 0;font-size:13px;color:#555}.note{font-size:11px;color:#888;margin-top:16px}</style></head><body>${docHTML(docType)}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='견적서_'+new Date().toISOString().slice(0,10)+'.html';a.click();}

function resetConfig(){state={material:DATA.materials[0].id,color:DATA.materials[0].colors[0].name,
  gang:1,mods:[null],wallboxQty:{}};document.getElementById('qty').value=1;renderAll();}

renderAll();renderCart();
